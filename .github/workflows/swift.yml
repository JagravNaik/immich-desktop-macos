name: Swift

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: swift-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build app product
        run: swift build --product ImmichMacApp

      - name: Run tests
        run: swift test
