name: Swift

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: swift-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Build and test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build app product
        run: swift build --product ImmichMacApp

      - name: Run tests
        run: swift test

      - name: Build app bundle
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./scripts/build-app.sh --release --output .build/artifacts

      - name: Archive app bundle
        run: ditto -c -k --keepParent .build/artifacts/ImmichMacApp.app .build/artifacts/ImmichMacApp-${{ github.sha }}.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmichMacApp-${{ github.run_number }}-${{ github.sha }}
          path: .build/artifacts/ImmichMacApp-${{ github.sha }}.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: build-${{ github.run_number }}.${{ github.run_attempt }}
          RELEASE_TITLE: Immich macOS build ${{ github.run_number }}.${{ github.run_attempt }}
          RELEASE_ASSET: .build/artifacts/ImmichMacApp-${{ github.sha }}.zip
        run: |
          gh release create "$RELEASE_TAG" \
            "$RELEASE_ASSET#ImmichMacApp-${{ github.run_number }}-${{ github.sha }}.zip" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --notes "Automated macOS app build from commit $GITHUB_SHA." \
            --prerelease \
            --latest=false
